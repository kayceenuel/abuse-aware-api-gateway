<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 980" style="background:#ffffff;font-family:sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── CLIENT ── -->
  <rect x="240" y="20" width="200" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="40" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Client</text>
  <text font-size="12" x="340" y="57" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">API key + IP address</text>

  <line x1="340" y1="68" x2="340" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── RING 1 ── -->
  <rect x="30" y="104" width="620" height="130" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="6 3"/>
  <text font-size="12" x="50" y="98" text-anchor="start" fill="#5F5E5A">Ring 1 — HTTP proxy</text>

  <rect x="60" y="124" width="200" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="160" y="144" text-anchor="middle" dominant-baseline="central" fill="#26215C">HTTP gateway</text>
  <text font-size="12" x="160" y="161" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Receive + parse request</text>

  <line x1="260" y1="148" x2="295" y2="148" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="295" y="124" width="180" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="385" y="144" text-anchor="middle" dominant-baseline="central" fill="#26215C">Route handler</text>
  <text font-size="12" x="385" y="161" text-anchor="middle" dominant-baseline="central" fill="#534AB7">login / search / purchase</text>

  <line x1="475" y1="148" x2="510" y2="148" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="124" width="110" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="565" y="144" text-anchor="middle" dominant-baseline="central" fill="#26215C">Forward</text>
  <text font-size="12" x="565" y="161" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Proxy to API</text>

  <line x1="340" y1="234" x2="340" y2="264" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── RING 2 ── -->
  <rect x="30" y="268" width="620" height="192" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="6 3"/>
  <text font-size="12" x="50" y="262" text-anchor="start" fill="#5F5E5A">Ring 2 — Rate limiter</text>

  <rect x="60" y="288" width="170" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="145" y="308" text-anchor="middle" dominant-baseline="central" fill="#04342C">Token bucket</text>
  <text font-size="12" x="145" y="325" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Per API key</text>

  <rect x="255" y="288" width="170" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="308" text-anchor="middle" dominant-baseline="central" fill="#04342C">Sliding window</text>
  <text font-size="12" x="340" y="325" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Per IP address</text>

  <rect x="450" y="288" width="170" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="535" y="308" text-anchor="middle" dominant-baseline="central" fill="#04342C">Redis</text>
  <text font-size="12" x="535" y="325" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Distributed counters</text>

  <line x1="230" y1="312" x2="255" y2="312" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="425" y1="312" x2="450" y2="312" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="215" y="366" width="250" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="388" text-anchor="middle" dominant-baseline="central" fill="#04342C">Allow or block decision</text>

  <path d="M145 336 L145 388 L215 388" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="336" x2="340" y2="366" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="340" y1="410" x2="340" y2="444" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── RING 3 ── -->
  <rect x="30" y="448" width="620" height="388" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="6 3"/>
  <text font-size="12" x="50" y="442" text-anchor="start" fill="#5F5E5A">Ring 3 — Kafka pipeline</text>

  <rect x="60" y="468" width="170" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="145" y="488" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Kafka producer</text>
  <text font-size="12" x="145" y="505" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Log every request</text>

  <line x1="230" y1="492" x2="265" y2="492" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="265" y="468" width="150" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="488" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Kafka topic</text>
  <text font-size="12" x="340" y="505" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Request log stream</text>

  <line x1="415" y1="492" x2="450" y2="492" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="450" y="468" width="170" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="535" y="488" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Kafka consumer</text>
  <text font-size="12" x="535" y="505" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Process log stream</text>

  <line x1="535" y1="516" x2="535" y2="550" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="215" y="554" width="250" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="574" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Risk scorer</text>
  <text font-size="12" x="340" y="591" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Detect abuse patterns</text>

  <path d="M535 550 L535 578 L465 578" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <line x1="340" y1="602" x2="340" y2="636" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="640" width="250" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="185" y="660" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Credential stuffing</text>
  <text font-size="12" x="185" y="677" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Many usernames, same IP</text>

  <rect x="370" y="640" width="250" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="495" y="660" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Scraping</text>
  <text font-size="12" x="495" y="677" text-anchor="middle" dominant-baseline="central" fill="#993C1D">High request rate per IP</text>

  <path d="M185 688 L185 752 L215 752" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M495 688 L495 752 L465 752" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="215" y="736" width="250" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="756" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Auto-tighten limits</text>
  <text font-size="12" x="340" y="773" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Push new rules to Redis</text>

  <!-- Feedback arrow -->
  <path d="M465 760 L630 760 L630 312 L620 312" fill="none" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text font-size="12" x="648" y="538" text-anchor="middle" fill="#D85A30">↻</text>
  <text font-size="12" x="648" y="554" text-anchor="middle" fill="#D85A30">feedback</text>

  <!-- ── FAKE PRODUCT API ── -->
  <line x1="340" y1="836" x2="340" y2="870" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="190" y="874" width="300" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="894" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Fake product API</text>
  <text font-size="12" x="340" y="911" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">login / search / purchase</text>

  <!-- Legend -->
  <rect x="40" y="944" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="12" x="58" y="954" fill="#5F5E5A">Ring 1</text>
  <rect x="120" y="944" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" x="138" y="954" fill="#5F5E5A">Ring 2</text>
  <rect x="200" y="944" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" x="218" y="954" fill="#5F5E5A">Ring 3</text>
  <line x1="278" y1="950" x2="306" y2="950" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="4 2"/>
  <text font-size="12" x="312" y="954" fill="#5F5E5A">Feedback loop</text>
</svg>
